name: fitme
description: A new Flutter project
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.2.1
  google_fonts: ^8.0.2
  percent_indicator: ^4.2.5
  firebase_core: ^4.4.0
  cloud_firestore: ^6.1.2
  firebase_auth: ^6.1.4
  http: ^1.6.0
  flutter_dotenv: ^6.0.1
  share_plus: ^13.1.0
  mobile_scanner: ^5.0.0
  image_picker: ^1.1.0
  speech_to_text: ^7.3.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/common_foods.json
    - .env
    - assets/progression_trees.json
    - assets/brands_india.json